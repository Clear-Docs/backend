spring.application.name=backend

# Async request timeout — default ~30s cuts off send-chat-message streaming; 10 min for LLM responses
spring.mvc.async.request-timeout=600000

# Multipart file upload limits (default 1MB is too small for documents)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

spring.datasource.url=
spring.datasource.username=
spring.datasource.password=

firebase.config.path=

cors.allowed-origins=

# Onyx API (for document sets / connectors)
# All paths built from onyx.manage-path, e.g. /manage/document-set, /manage/admin/...
onyx.base-url=http://155.212.162.11:3000/api
onyx.manage-path=/manage
onyx.api-key=

# Tochka: значения из env (TOCHKA_API_KEY, TOCHKA_PURPOSE). customer-code получается через Get Customers List при каждом платеже.
# tranche-count — сколько списаний по подписке (от этого зависит повтор: 1 = только один платёж, 12 = ежемесячно 12 раз).
# webhook-url — опционально; если не задан, используется захардкоженный URL в TochkaPaymentService.
# client-id — опционально; если не задан, берётся из JWT (claim iss).
tochka.api-key=
tochka.webhook-url=
tochka.client-id=
tochka.purpose=
tochka.subscription.tranche-count=12
tochka.payment-modes=sbp,card,tinkoff